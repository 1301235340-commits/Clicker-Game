<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicker!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #034660 0%, #000000 100%);
            font-family: Arial, sans-serif;
        }
        
        #clickButton {
            width: 500px;
            height: 500px;
            border-radius: 50%;
            border: none;
            background: #8d0303;
            color: rgb(0, 0, 0);
            font-size: 36px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease;
        }
        
        #clickButton:hover {
            background: #b80909;
            transform: scale(1.05);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.4);
        }
        
        #clickButton:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <button id="clickButton">Click!</button>
    <script src="script.js"></script>
</body>
</html>
