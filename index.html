<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedClickerButton!</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div id="statusBoard"
        style="position: absolute; top: 20px; right: 20px; background: rgba(116, 7, 7, 0.9); padding: 20px; border-radius: 10px; color: black;">
        <h1>Stats:</h1>
        <h3>Total Clicks: <span id="totalClicks">0</span></h3>
        <h3>Power-Ups Owned: <span id="powerUpCount">0</span></h3>
        <h3>Times Played: <span id="timesPlayed">0</span></h3>
    </div>


    <button id="clickButton">Click!</button>

    <button id="powerUpButton" style="display: none; position: absolute; bottom: 20px; left: 20px; padding: 10px 20px;
     background: #710909; color: black; border: none; border-radius: 5px; cursor: pointer; font-size: 18px;">Power
        Up!</button>

    <script src="script.js"></script>
</body>

</html>
